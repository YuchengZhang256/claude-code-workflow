# Template — copy to <host>.conf and edit. Lines starting with # are ignored.
# Every variable is optional. Keep only what you actually need.

# Try this layer first. One of: jina | stealth | wayback
# PREFER_LAYER='jina'

# Skip these layers entirely. Space-separated.
# SKIP_LAYERS='wayback'

# Jina Reader hints (only used when the jina layer runs).
# JINA_WAIT_FOR='article'
# JINA_TARGET_SELECTOR='main article'
# JINA_TIMEOUT='30'

# Stealth-curl extras.
# STEALTH_REFERER='https://www.google.com/'
# STEALTH_EXTRA='X-Custom-Header: value
# Cookie: foo=bar'

# Free-text note logged to stderr at fetch time.
# NOTES='<what was broken before, what fix was verified>'
